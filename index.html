<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROXY MARKETING AI // THE GRID</title>
    <style>
        /* GLOBAL RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050505; /* Dark matte carbon */
            color: #00f2ff;
            font-family: 'Courier New', monospace;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* THE MODAL OVERLAY - FIXED: Now visible by default */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; /* Changed from none so you can actually see it */
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px; /* Safe zone for mobile edges */
        }

        /* THE UI BOX */
        #modal-content {
            width: 100%;
            max-width: 450px;
            background: #000;
            border: 2px solid #00f2ff;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        /* RESPONSIVE HEADER */
        #result-text {
            font-family: 'Arial Black', sans-serif; /* Fallback until your Shader font loads */
            font-size: 8vw; /* Scales to screen width */
            color: #fff;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        @media (min-width: 600px) {
            #result-text { font-size: 3rem; }
        }

        #sub-text {
            font-size: 0.9rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* FORM STYLING */
        .name-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input {
            background: #000;
            border: 1px solid #00f2ff;
            color: #00f2ff;
            padding: 12px;
            font-family: inherit;
            width: 100%;
            outline: none;
            font-size: 1rem;
        }

        input::placeholder {
            color: rgba(0, 242, 255, 0.4);
        }

        #submitBtn {
            width: 100%;
            background: #00f2ff;
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 10px;
            cursor: pointer;
        }

        .legal-notice {
            font-size: 0.65rem;
            color: rgba(0, 242, 255, 0.6);
            margin-top: 20px;
            line-height: 1.4;
            text-align: justify;
        }

        #confirmation-msg {
            display: none;
            font-size: 7vw;
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="modal">
        <div id="modal-content">
            <div id="result-text">PROXY PROTOCOL</div>
            <p id="sub-text">IDENTIFICATION REQUIRED FOR GRID ACCESS.</p>
            
            <form id="emailForm" action="#" method="POST">
                <div class="name-container">
                    <input type="text" id="firstName" placeholder="FIRST_NAME" required>
                    <input type="text" id="lastName" placeholder="LAST_NAME" required>
                </div>
                <input type="email" id="emailInput" placeholder="USER@PROTOCOL.AI" required>
                <button type="submit" id="submitBtn">INITIALIZE</button>
            </form>
            
            <div class="legal-notice">
                // PROTOCOL_NOTICE: BY INITIALIZING, YOU PERMIT PROXY MARKETING AI TO TRANSMIT ENCRYPTED COMMUNICATIONS.
            </div>
            
            <div id="confirmation-msg">PROXY INITIATED!</div>
        </div>
    </div>

    <script src="game.bf12ad.js"></script>
</body>
</html>
