<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proxy Marketing AI | Coming Soon</title>
    
    <link rel="stylesheet" href="https://use.typekit.net/pmk7ptm.css">
    
    <link rel="stylesheet" href="style.css?v=1.5">
</head>
<body>
    <div id="header">
        <h1>PROXY MARKETING AI</h1>
        <p>COMING SOON</p>
    </div>

    <canvas id="gridCanvas"></canvas>

    <div id="instructions"></div>

    <div id="controls">
        <div style="grid-column: 2" class="btn" id="up"><div class="arrow up"></div></div>
        <div style="grid-column: 1" class="btn" id="left"><div class="arrow left"></div></div>
        <div style="grid-column: 3" class="btn" id="right"><div class="arrow right"></div></div>
        <div style="grid-column: 2" class="btn" id="down"><div class="arrow down"></div></div>
    </div>

    <div id="modal">
        <div id="modal-content">
            <div id="result-text" class="glitch" data-text=""></div>
            <p id="sub-text">IDENTIFICATION REQUIRED FOR GRID ACCESS.</p>
            <form id="emailForm">
                <div class="name-fields">
                    <input type="text" id="firstName" placeholder="FIRST_NAME" required>
                    <input type="text" id="lastName" placeholder="LAST_NAME" required>
                </div>
                <input type="email" id="emailInput" placeholder="USER@PROTOCOL.AI" required>
                <button type="submit" id="submitBtn">INITIALIZE</button>
            </form>
            <div class="legal-notice" id="legalNotice">
                //DISCLAIMER: TRANSMITTING YOUR INFORMATION PERMITS PROXY MARKETING AI TO CONTACT YOU REGARDING DIGITAL PROTOCOLS AND STRATEGIC SERVICES.
            </div>
            <div id="confirmation-msg" style="display:none;">
                PROXY INITIATED!
            </div>
        </div>
    </div>

    <script src="game.bf12ad.js"></script>
</body>
</html>
