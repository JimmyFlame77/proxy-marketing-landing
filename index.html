<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proxy Marketing AI | Coming Soon</title>
    
    <link rel="stylesheet" href="https://use.typekit.net/pmk7ptm.css">
    
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>
    <div id="header">
        <h1>PROXY MARKETING AI</h1>
        <p>COMING SOON</p>
    </div>

    <canvas id="gridCanvas"></canvas>

    <div id="instructions"></div>

    <div id="controls">
        <div style="grid-column: 2" class="btn" id="up"><div class="arrow up"></div></div>
        <div style="grid-column: 1" class="btn" id="left"><div class="arrow left"></div></div>
        <div style="grid-column: 3" class="btn" id="right"><div class="arrow right"></div></div>
        <div style="grid-column: 2" class="btn" id="down"><div class="arrow down"></div></div>
    </div>

    <div id="modal">
        <div id="modal-content">
            <div id="result-text" class="glitch" data-text=""></div>
            <p id="sub-text">Join the Proxy Protocol for early access.</p>
            <form id="emailForm">
                <input type="email" id="emailInput" placeholder="USER@PROTOCOL.AI" required>
                <button type="submit" id="submitBtn">INITIALIZE</button>
            </form>
            <div class="legal-notice">
                By initializing, you permit Proxy Marketing AI to transmit communications regarding digital marketing protocols and services.
            </div>
            <div id="confirmation-msg" style="display:none; font-size: 1.4rem; color: #00f2ff; margin-top: 20px; text-shadow: 0 0 10px #00f2ff;">
                PROXY INITIATED!
            </div>
        </div>
    </div>

    <script src="game.bf12ad.js"></script>
</body>
</html>
