<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proxy Marketing AI | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1>PROXY MARKETING AI</h1>
        <p>COMING SOON</p>
    </div>

    <canvas id="gridCanvas"></canvas>

    <div id="controls">
        <div style="grid-column: 2" class="btn" id="up">▲</div>
        <div style="grid-column: 1" class="btn" id="left">◀</div>
        <div style="grid-column: 3" class="btn" id="right">▶</div>
        <div style="grid-column: 2" class="btn" id="down">▼</div>
    </div>

    <div id="modal">
        <div id="result-text"></div>
        <p style="font-size: 0.9rem; margin-bottom: 20px;">The grid is evolving. Join the Proxy Protocol for early access.</p>
        <form id="emailForm">
            <input type="email" placeholder="ENTER EMAIL ADDRESS" required>
            <button type="submit">INITIALIZE</button>
        </form>
    </div>

    <script src="game.js"></script>
</body>
</html>
