<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proxy Marketing AI | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1>PROXY MARKETING AI</h1>
        <p>COMING SOON</p>
    </div>

    <canvas id="gridCanvas"></canvas>

    <div id="instructions">
        <span class="desktop-instr">USE ARROW KEYS TO NAVIGATE THE GRID</span>
        <span class="mobile-instr">USE ON-SCREEN CONTROLS TO NAVIGATE</span>
    </div>

    <div id="controls">
        <div style="grid-column: 2" class="btn" id="up">▲</div>
        <div style="grid-column: 1" class="btn" id="left">◀</div>
        <div style="grid-column: 3" class="btn" id="right">▶</div>
        <div style="grid-column: 2" class="btn" id="down">▼</div>
    </div>

    <div id="modal">
        <div id="modal-content">
            <div id="result-text"></div>
            <p id="sub-text">The grid is evolving. Join the Proxy Protocol for early access.</p>
            <form id="emailForm">
                <input type="email" id="emailInput" placeholder="ENTER EMAIL ADDRESS" required>
                <button type="submit" id="submitBtn">INITIALIZE</button>
            </form>
            <div id="confirmation-msg" style="display:none; font-size: 1.5rem; color: #00f2ff; margin-top: 20px;">
                PROXY INITIATED!
            </div>
        </div>
    </div>

    <script src="game-v2.js"></script>
</body>
</html>
